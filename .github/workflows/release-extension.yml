name: Release Extension ZIP

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      with_website:
        description: "Also package and upload the website/demo ZIP."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release-extension:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run reliability suite
        run: pnpm test:reliability

      - name: Run tests
        run: pnpm test

      - name: Validate and package release artifact
        run: pnpm release:check

      - name: Optionally package website artifact
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.with_website == 'true'
        run: pnpm package:website

      - name: Read manifest version
        id: manifest
        run: |
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('dist/manifest.json', 'utf8')).version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$TAG_VERSION" != "${{ steps.manifest.outputs.version }}" ]; then
            echo "Tag version (v$TAG_VERSION) does not match manifest version (${{ steps.manifest.outputs.version }})."
            exit 1
          fi

      - name: Upload artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: totem-v${{ steps.manifest.outputs.version }}
          path: release/*.zip

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*.zip
